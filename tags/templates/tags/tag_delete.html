{% extends "base.html" %}

{% block title %}Delete Tag{% endblock %}

{% block content %}
<h1>Delete Tag</h1>

<p>Are you sure you want to delete the tag: "<strong>{{ object.name }}</strong>"?</p>

<form method="post">
    {% csrf_token %}
    <button type="submit">Yes, delete</button>
    <a href="{% url 'tags:tag_list' %}">Cancel</a>
</form>
{% endblock %}
