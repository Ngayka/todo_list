{% extends "base.html" %}

{% block title %} Tags {% endblock %}

{% block content %}
<h1>Tags</h1>
    <a href="{% url 'tags:tag_create' %}">Add Tag</a>
    <ul>
        {% for tag in tags %}
        <li>
            {{ tag.name }}
            <a href="{% url 'tags:tag_update' tag.id %}">Edit</a>
            <a href="{% url 'tags:tag_delete' tag.id %}">Delete</a>
        </li>
        {% endfor %}
    </ul>
{% endblock %}
